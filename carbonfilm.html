<!DOCTYPE html>

<meta charset="UTF-8">

<title>Zener Diodes</title>
<link rel="stylesheet" href="styles.css">
<style>
body {
    font-family: Arial;
    background: #f8f8f8;
    text-align: center;
    font-weight: bold;
}

/* Grid */
.zener-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
    width: 90%;
    margin: 40px auto;
}

/* Card */
.zener-card {
    background: white;
    padding: 15px;
    border-radius: 10px;
    cursor: pointer;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    transition: 0.3s;
}

.zener-card:hover {
    transform: scale(1.05);
}

/* Image */
.zener-card img {
    width: 100px;
}

/* Details box */
#details {
    width: 80%;
    margin: 30px auto;
    padding: 20px;
    background: white;
    border-radius: 10px;
    display: none;
    box-shadow: 0 2px 6px rgba(0,0,0,0.3);
}
</style>

<script>
function showZener(type) {

    let title = document.getElementById("title");
    let info = document.getElementById("info");
    let box = document.getElementById("details");
    

    if (type === "axial leaded") {
        title.innerHTML = "Axial-Leaded Carbon Film Resistors";
        info.innerHTML = "Axial-leaded carbon film resistors are fixed-value resistors characterized by a carbon film deposited on a cylindrical ceramic core, with leads extending horizontally from both ends. They are commonly used in through-hole PCB designs, offering a low-cost solution for current limiting, voltage division, and signal conditioning, typically with a tolerance of 2% to 5%";
    }

    else if (type === "radial leaded") {
        title.innerHTML = "Radial-Leaded Carbon Film Resistors";
        info.innerHTML = "Radial-leaded carbon film resistors are a type of through-hole, fixed resistor where both wire leads extend from the same side of the cylindrical body, rather than opposite ends. They are designed for high-density mounting, allowing them to occupy less board space than their axial counterparts, making them ideal for compact circuits, consumer electronics, and vertical installation. ";
    }

    else if (type === "high voltage") {
        title.innerHTML = "High-Voltage/Power Carbon Film Resistors";
        info.innerHTML = "High-voltage/power carbon film resistors are specialized components designed to handle high energy levels, offering superior stability at elevated temperatures (up to 350°C) and operating voltages up to 15kV. These resistors are often manufactured with thick, specialized film layers to manage high surge currents and power dissipation in demanding applications. ";
    }

 
    box.style.display = "block";
}
</script>

</head>
