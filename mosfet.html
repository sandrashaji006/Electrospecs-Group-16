<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOSFET</title>
<link rel="stylesheet" href="styles.css">
<style>
body {
    font-family: Arial;
    background: #f8f8f8;
    text-align: center;
    font-weight: bold;
}

/* Grid */
.mosfet-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
    width: 90%;
    margin: 40px auto;
}

/* Card */
.mosfet-card {
    background: white;
    padding: 15px;
    border-radius: 10px;
    cursor: pointer;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    transition: 0.3s;
}

.mosfet-card:hover {
    transform: scale(1.05);
}

/* Image */
.mosfet-card img {
    width: 100px;
}

/* Details box */
#details {
    width: 80%;
    margin: 30px auto;
    padding: 20px;
    background: white;
    border-radius: 10px;
    display: none;
    box-shadow: 0 2px 6px rgba(0,0,0,0.3);
}
</style>

<script>
    window.onload = function () {

    let hash = window.location.hash;

    if (hash) {
        let type = hash.replace("#", "");
        showMosfet(type);
    }
}
function showMosfet(type) {

    let title = document.getElementById("title");
    let info = document.getElementById("info");
    let box = document.getElementById("details");

    

    if (type === "irfz44n") {
        title.innerHTML = "IRFZ44N";
        info.innerHTML = "The IRFZ44N MOSFET is a widely used N-channel enhancement-mode power MOSFET, commonly used in high-current switching applications like motor drivers and power supplies.It has a maximum drain-source voltage of about 55 V and can handle a continuous drain current of up to 49 A (with proper heat sinking). The maximum power dissipation is approximately 94 W. It has a low drain-source on-resistance of around 0.022 Ω, which makes it efficient for switching applications. The gate threshold voltage typically ranges from 2 V to 4 V, but for full conduction it usually requires around 10 V at the gate. The total gate charge is about 67 nC, affecting switching speed. The switching speed is high, making it suitable for PWM applications. It is commonly available in a TO-220 package.";
    }

    else if (type === "2n7000") {
        title.innerHTML = "2N7000";
        info.innerHTML = "The 2N7000 MOSFET is a low-power N-channel enhancement-mode MOSFET commonly used for switching and digital circuits.It has a maximum drain-source voltage of about 60 V and can handle a continuous drain current of up to 200 mA. The power dissipation is approximately 400 mW to 500 mW depending on conditions. It has a drain-source on-resistance typically around 5 Ω, which is higher than power MOSFETs. The gate threshold voltage ranges from about 2 V to 4 V, allowing it to be driven by logic-level signals. The total gate charge is relatively low, making it suitable for fast switching. The base-emitter equivalent (gate-source voltage for conduction) is typically driven at 5–10 V for better performance. It is commonly available in a TO-92 package";
    }

    else if (type === "irf540n") {
        title.innerHTML = "IRF540N";
        info.innerHTML = "The IRF540N MOSFET is a popular N-channel enhancement-mode power MOSFET used in high-current switching, motor control, and power supply circuits.It has a maximum drain-source voltage of about 100 V and can handle a continuous drain current of up to 33 A. The maximum power dissipation is approximately 94 W. It has a low drain-source on-resistance of around 0.044 Ω, which helps reduce power loss during switching. The gate threshold voltage typically ranges from 2 V to 4 V, but for full conduction it usually requires around 10 V at the gate. The total gate charge is about 71 nC, influencing switching speed. It supports high-speed switching and is suitable for PWM applications. It is commonly available in a TO-220 package, allowing easy mounting with a heat sink.";
    }

    else if(type === "bss138") {
        title.innerHTML = "BSS138";
        info.innerHTML = "The BSS138 MOSFET is a small-signal N-channel enhancement-mode MOSFET widely used in low-voltage switching and level-shifting circuits (especially with microcontrollers).It has a maximum drain-source voltage of about 50 V and can handle a continuous drain current of up to 200 mA. The power dissipation is approximately 350 mW. It features a low gate threshold voltage of around 1 V to 2.5 V, making it ideal for logic-level operation with 3.3 V and 5 V systems. The drain-source on-resistance is typically around 3.5 Ω. The total gate charge is low, enabling fast switching in digital applications. It is commonly available in a SOT-23 surface-mount package.";
    }
    else if(type === "irf9540n") {
        title.innerHTML = "IRF9540N";
        info.innerHTML = "The IRF9540N MOSFET is a P-channel enhancement-mode power MOSFET commonly used in high-side switching and power control applications.It has a maximum drain-source voltage of about –100 V and can handle a continuous drain current of up to –23 A (with proper heat sinking). The maximum power dissipation is approximately 140 W. It has a drain-source on-resistance of around 0.117 Ω, which is higher than N-channel MOSFETs but typical for P-channel devices. The gate threshold voltage ranges from about –2 V to –4 V, but for full conduction it usually requires around –10 V at the gate. The total gate charge is relatively high, around 140 nC, affecting switching speed. It supports moderate-speed switching and is widely used in power circuits. It is commonly available in a TO-220 package, suitable for heat sink mounting";
    }

    
    box.style.display = "block";
}
</script>

</head>
