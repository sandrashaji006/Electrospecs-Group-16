<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Supercapacitors</title>
<link rel="stylesheet" href="styles.css">
<style>
body {
    font-family: Arial;
    background: #f8f8f8;
    text-align: center;
    font-weight: bold;
}

/* Grid */
.super-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
    width: 90%;
    margin: 40px auto;
}

/* Card */
.super-card {
    background: white;
    padding: 15px;
    border-radius: 10px;
    cursor: pointer;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    transition: 0.3s;
}

.super-card:hover {
    transform: scale(1.05);
}

/* Image */
.super-card img {
    width: 100px;
}

/* Details box */
#details {
    width: 80%;
    margin: 30px auto;
    padding: 20px;
    background: white;
    border-radius: 12px;
    display: none;

    box-shadow: 0 10px 25px rgba(0,0,0,0.3);

    transform: scale(0.8);
    opacity: 0;
    transition: all 0.35s ease;
}

/* when active */
#details.show {
    display: block;
    transform: scale(1);
    opacity: 1;
}
</style>

<script>
function showsuper(type) {

    let title = document.getElementById("title");
    let info = document.getElementById("info");
    let box = document.getElementById("details");
    

    if (type === "edlc") {
        title.innerHTML = "Electric Double-Layer Capacitors (EDLCs)";
        info.innerHTML = "These store energy through electrostatic charge separation at the electrode–electrolyte interface, without any chemical reaction. They offer very high capacitance, long cycle life (over 1 million cycles), fast charge–discharge capability, and are widely used in backup power, memory backup, and energy recovery systems.";
    }

    else if (type === "pseudo") {
        title.innerHTML = "Pseudocapacitors";
        info.innerHTML = "These store energy through fast and reversible redox (electrochemical) reactions on the electrode surface. They provide higher energy density than EDLCs but slightly lower cycle life. They are used in applications requiring higher energy storage such as hybrid energy systems and advanced electronics.";
    }

    else if (type === "hybrid") {
        title.innerHTML = "Hybrid Supercapacitors";
        info.innerHTML = "These combine the working principles of EDLCs and batteries (or pseudocapacitors), offering a balance between high power density and improved energy density. They are used in electric vehicles, renewable energy storage, and high-performance power backup systems.";
    }
   
       box.classList.remove("show");
 
    box.style.display = "block";

// trigger animation
setTimeout(() => {
    box.classList.add("show");
}, 10);
}
</script>

</head>

<body>
    <header>
     
        <div class="header-container">
            
            <!-- Logo + Name -->
            <img src="logo.jpeg" alt="Logo" class="logo">
            </div>
    <div class="header-left">
        <h1>ELECTROSPECS</h1>
    </div>

    <div class="scrolling-banner">
        <p>Welcome to ElectroSpecs | Explore Electronics Components | Learn & Build 🚀</p>
    </div>

</header>

<h2>Supercapacitor</h2>

<!-- supercapacitor GRID -->
<div class="super-container">

    <div class="super-card" onclick="showsuper('edlc')">
        <img src="edlc.jpeg">
        <p>ELECTRIC DOUBLE-LAYER CAPACITOR</p>
    </div>

    <div class="super-card" onclick="showsuper('pseudo')">
        <img src="pseudo.jpeg">
        <p>PSEUDOCAPACITOR</p>
    </div>

    <div class="super-card" onclick="showsuper('hybrid')">
        <img src="hybrid.jpeg">
        <p>HYBRID CAPACITOR</p>
    </div>



  

 </div>    
<!-- DETAILS -->
<div id="details">
    <h2 id="title"></h2>
    <p id="info"></p>
</div>
