<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PIN</title>
<link rel="stylesheet" href="styles.css">
<style>
body {
    font-family: Arial;
    background: #f8f8f8;
    text-align: center;
    font-weight: bold;
}

/* Grid */
.pin-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
    width: 90%;
    margin: 40px auto;
}

/* Card */
.pin-card {
    background: white;
    padding: 15px;
    border-radius: 10px;
    cursor: pointer;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    transition: 0.3s;
}

.pin-card:hover {
    transform: scale(1.05);
}

/* Image */
.pin-card img {
    width: 100px;
}

/* Details box */
#details {
    width: 80%;
    margin: 30px auto;
    padding: 20px;
    background: white;
    border-radius: 10px;
    display: none;
    box-shadow: 0 2px 6px rgba(0,0,0,0.3);
}
</style>

<script>
    window.onload = function () {

    let hash = window.location.hash;

    if (hash) {
        let type = hash.replace("#", "");
        showPin(type);
    }
}
function showPin(type) {

    let title = document.getElementById("title");
    let info = document.getElementById("info");
    let box = document.getElementById("details");

    

    if (type === "ba479") {
        title.innerHTML = "BA479";
        info.innerHTML = "The BA479 PIN diode is a high-speed switching diode designed mainly for RF and microwave applications. It operates with a low forward resistance (typically a few ohms when forward biased) and a high reverse resistance, making it suitable for signal attenuation and switching. The diode can handle a reverse voltage of around 30–60 V and supports low capacitance (in the picofarad range), which helps maintain performance at high frequencies. It has a fast switching speed due to its intrinsic layer, enabling efficient operation in communication circuits. The BA479 is commonly used in RF switches, attenuators, and modulators, and is usually available in a compact DO-35 glass package.";
    }

    
    box.style.display = "block";
}
</script>

</head>

<body>
    <header>
     
        <div class="header-container">
            
            <!-- Logo + Name -->
            <img src="logo.png" alt="Logo" class="logo">
            </div>
    <div class="header-left">
        <h1>ELECTROSPECS</h1>
    </div>

    <div class="scrolling-banner">
        <p>Welcome to ElectroSpecs | Explore Electronics Components | Learn & Build 🚀</p>
    </div>

</header>

<h2>PIN DIODE</h2>

<!-- PIN GRID -->
<div class="pin-container">

    <div class="pin-card" onclick="showPin('ba479')">
        <img src="images/ba479.jpg">
        <p>BA479</p>
    </div>

</div>

<!-- DETAILS -->
<div id="details">
    <h2 id="title"></h2>
    <p id="info"></p>
</div>

</html>
