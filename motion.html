<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOTION SENSOR</title>
<link rel="stylesheet" href="styles.css">
<style>
body {
    font-family: Arial;
    background: #f8f8f8;
    text-align: center;
    font-weight: bold;
}

/* Grid */
.motion-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
    width: 90%;
    margin: 40px auto;
}

/* Card */
.motion-card {
    background: white;
    padding: 15px;
    border-radius: 10px;
    cursor: pointer;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    transition: 0.3s;
}

.motion-card:hover {
    transform: scale(1.05);
}

/* Image */
.motion-card img {
    width: 100px;
}

/* Details box */
#details {
    width: 80%;
    margin: 30px auto;
    padding: 20px;
    background: white;
    border-radius: 10px;
    display: none;
    box-shadow: 0 2px 6px rgba(0,0,0,0.3);
}
</style>

<script>
    window.onload = function () {

    let hash = window.location.hash;

    if (hash) {
        let type = hash.replace("#", "");
        showMotion(type);
    }
}
function showMotion(type) {

    let title = document.getElementById("title");
    let info = document.getElementById("info");
    let box = document.getElementById("details");

    

    if (type === "hc-sr04") {
        title.innerHTML = "HC-SR04";
        info.innerHTML = "The HC-SR04 ultrasonic sensor is a non-contact distance measuring sensor that uses ultrasonic waves. It operates at a 5 V supply and has a typical measuring range of 2 cm to 400 cm with an accuracy of about ±3 mm. The sensor uses TRIG and ECHO digital pins for communication and measures distance by calculating echo return time. It works at a frequency of 40 kHz and is widely used in obstacle detection, robotics, and distance measurement systems.";
    }

    else if(type === "rcwl-0516") {
        title.innerHTML = "RCWL-0516";
        info.innerHTML = "The RCWL-0516 microwave radar sensor is a Doppler microwave motion detection module that works by emitting and receiving microwave signals to detect movement. It operates with a wide supply voltage of 4 V to 28 V DC and consumes about 2.8–3 mA current. The sensor works at a frequency of around 3.2 GHz with a transmission power of up to 20–30 mW. It provides a digital output (3.3 V TTL HIGH when motion is detected) with a trigger time of about 2–3 seconds. The detection range is typically 5 to 7 meters, and it can detect motion through thin materials like plastic or glass.";
    }
    else if(type === "aqarafp2") {
        title.innerHTML = "AqaraFP2";
        info.innerHTML = "The Aqara FP2 presence sensor is a mmWave radar-based smart presence sensor used for advanced room automation and human detection.It operates on 5V DC (USB-C powered) and uses Wi-Fi (2.4 GHz) + Bluetooth 4.2 for connectivity. The sensor works using 60–64 GHz millimeter-wave radar, allowing it to detect even small human movements and stationary presence.Its detection range is about up to 6–8 meters (or ~40 m² room coverage) with a 120° field of view. It can detect up to 5 people simultaneously and divide a room into up to 30 zones for precise automation. It also includes a built-in light (lux) sensor and supports fall detection and multi-ecosystem integration (HomeKit, Alexa, Google Home, etc.)";
    }
    else if(type === "vl53l1x") {
        title.innerHTML = "VL53L1X";
        info.innerHTML = "The VL53L1X time-of-flight sensor is a high-precision laser distance (ToF) sensor used for measuring absolute distance.It operates with a supply voltage of about 2.6 V to 3.5 V (typically 3.3 V) and communicates via I²C interface. The sensor uses a 940 nm invisible Class 1 laser and a SPAD receiver array to measure distance based on light travel time.Its key specs include a measuring range up to 4 meters, typical resolution in millimeters, and a field of view of about 27° (configurable using ROI). It supports up to ~50 Hz sampling rate, works well in different lighting conditions, and is not affected by target color or reflectivity. It also includes built-in optical filters and low-power operation, making it ideal for robotics, drones, and smart sensing applications.";
    }

    
    box.style.display = "block";
}
</script>

</head>

<body>
    <header>
     
        <div class="header-container">
            
            <!-- Logo + Name -->
            <img src="logo.png" alt="Logo" class="logo">
            </div>
    <div class="header-left">
        <h1>ELECTROSPECS</h1>
    </div>

    <div class="scrolling-banner">
        <p>Welcome to ElectroSpecs | Explore Electronics Components | Learn & Build 🚀</p>
    </div>

</header>

<h2>MOTION SENSORS</h2>

<!-- MOTION SENSOR GRID -->
<div class="motion-container">

    <div class="motion-card" onclick="showMotion('hc-sr04')">
        <img src="images/hc-sr04.jpg">
        <p>HC-SR04</p>
    </div>
    <div class="motion-card" onclick="showMotion('rcwl-0516')">
        <img src="images/rcwl-0516.jpg">
        <p>RCWL-0516</p>
    </div>
    <div class="motion-card" onclick="showMotion('aqarafp2')">
        <img src="images/aqarafp2.jpg">
        <p>AqaraFP2</p>
    </div>
    <div class="motion-card" onclick="showMotion('vl53l1x')">
        <img src="images/vl53l1x.jpg">
        <p>VL53L1X</p>
    </div>
    
</div>

<!-- DETAILS -->
<div id="details">
    <h2 id="title"></h2>
    <p id="info"></p>
</div>
