<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Varistors</title>
<link rel="stylesheet" href="styles.css">
<style>
body {
    font-family: Arial;
    background: #f8f8f8;
    text-align: center;
    font-weight: bold;
}

/* Grid */
.varistors-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
    width: 90%;
    margin: 40px auto;
}

/* Card */
.varistors-card {
    background: white;
    padding: 15px;
    border-radius: 10px;
    cursor: pointer;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    transition: 0.3s;
}

.varistors-card:hover {
    transform: scale(1.05);
}

/* Image */
.varistors-card img {
    width: 100px;
}

/* Details box */
#details {
    width: 80%;
    margin: 30px auto;
    padding: 20px;
    background: white;
    border-radius: 12px;
    display: none;

    box-shadow: 0 10px 25px rgba(0,0,0,0.3);

    transform: scale(0.8);
    opacity: 0;
    transition: all 0.35s ease;
}

/* when active */
#details.show {
    display: block;
    transform: scale(1);
    opacity: 1;
}
</style>

<script>
function showvaristors(type) {

    let title = document.getElementById("title");
    let info = document.getElementById("info");
    let box = document.getElementById("details");
    

    if (type === "mov") {
        title.innerHTML = "Metal Oxide Varistor (MOV)";
        info.innerHTML = "Zinc oxide-based, voltage rating 120–600 V, clamping voltage 150–700 V, energy handling 10–hundreds of joules, surge current 100 A–10,000 A, response time <25 ns, operating temperature −40°C to 85°C. Silicon Carbide (SiC) Varistor: Voltage rating 200–1000 V, clamping voltage 300–1200 V, energy 5–50 J, surge current 50–500 A, response time ~1 μs, operating temperature −55°C to 125°C. Polymer Varistor: Voltage rating 5–100 V, clamping voltage 6–120 V, energy <10 J, surge current 20–500 A, response time <10 ns, operating temperature −40°C to 125°C.";
    }

    else if (type === "sic") {
        title.innerHTML = "Silicon Carbide (SiC) Varistor";
        info.innerHTML = "Made from silicon carbide, designed for high-voltage and high-energy surge protection, typical voltage ratings 200 V to 2000 V, clamping voltages 250 V to 2500 V, energy handling 50–1000 J, response time <25 ns, operating temperature −40°C to 125°C, used in industrial power lines and lightning protection. Polymer Varistor (PV): Uses a conductive polymer matrix for non-linear resistance, voltage ratings 5 V to 600 V, clamping voltage 6 V to 650 V, energy handling 1–100 J, ultra-fast response <10 ns, flexible and lightweight, widely used in electronics, telecommunications, and sensitive circuit protection. ";
    }

    else if (type === "pv") {
        title.innerHTML = "Polymer Varistor (PV)";
        info.innerHTML = "A Polymer Varistor (PV) is a surge protection device made from a conductive polymer matrix, offering nonlinear resistance that rapidly increases under overvoltage conditions. It typically has voltage ratings from 5 V to 600 V, clamping voltages from 6 V to 650 V, and can absorb energies ranging 1 J to 100 J. PVs respond extremely fast, often in less than 10 ns, are lightweight, flexible, and durable, making them ideal for protecting sensitive electronics, telecommunications equipment, and low-power circuits against voltage spikes.";
    }
    else if (type === "glass") {
        title.innerHTML = "Glass Varistor";
        info.innerHTML = "Typically used in high-voltage and precision applications, voltage rating 100–1000 V, clamping voltage 120–1200 V, low energy handling (<10 J), very fast response (<10 ns), stable over temperature, operating −40°C to 125°C. Hybrid Varistor: Combines characteristics of MOV and polymer types, voltage rating 50–600 V, clamping voltage 60–700 V, energy 10–200 J, surge current 100–5000 A, fast response (<25 ns), used where high energy absorption and stability are both needed.";
    }

       box.classList.remove("show");
 
    box.style.display = "block";

// trigger animation
setTimeout(() => {
    box.classList.add("show");
}, 10);
}
</script>

</head>

<body>
    <header>
     
        <div class="header-container">
            
            <!-- Logo + Name -->
            <img src="logo.jpeg" alt="Logo" class="logo">
            </div>
    <div class="header-left">
        <h1>ELECTROSPECS</h1>
    </div>

    <div class="scrolling-banner">
        <p>Welcome to ElectroSpecs | Explore Electronics Components | Learn & Build 🚀</p>
    </div>

</header>

<h2>Varistors</h2>

<!-- varistors GRID -->
<div class="varistors-container">

    <div class="varistors-card" onclick="showvaristors('mov')">
        <img src="metaloxidev.jpeg">
        <p>METAL OXIDE VARISTOR</p>
    </div>

    <div class="varistors-card" onclick="showvaristors('sic')">
        <img src="siliconv.jpeg">
        <p>SILICON VARISTOR</p>
    </div>

    <div class="varistors-card" onclick="showvaristors('pv')">
        <img src="polymerv.jpeg">
        <p>PLOYMER VARISTOR</p>
    </div>

    <div class="varistors-card" onclick="showvaristors('glass')">
        <img src="glassv.jpeg">
        <p>GLASS VARISTOR</p>
    </div>

  

 </div>    
<!-- DETAILS -->
