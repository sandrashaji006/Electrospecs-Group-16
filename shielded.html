<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shielded Cable Types</title>
<link rel="stylesheet" href="styles.css">
<style>
body {
    font-family: Arial;
    background: #f8f8f8;
    text-align: center;
    font-weight: bold;
}

/* Grid */
.shielded-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
    width: 90%;
    margin: 40px auto;
}

/* Card */
.shielded-card {
    background: white;
    padding: 15px;
    border-radius: 10px;
    cursor: pointer;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    transition: 0.3s;
}

.shielded-card:hover {
    transform: scale(1.05);
}

/* Image */
.shielded-card img {
    width: 100px;
}

/* Details box */
#details {
    width: 80%;
    margin: 30px auto;
    padding: 20px;
    background: white;
    border-radius: 12px;
    display: none;

    box-shadow: 0 10px 25px rgba(0,0,0,0.3);

    transform: scale(0.8);
    opacity: 0;
    transition: all 0.35s ease;
}

/* when active */
#details.show {
    display: block;
    transform: scale(1);
    opacity: 1;
}
</style>

<script>
function showshielded(type) {

    let title = document.getElementById("title");
    let info = document.getElementById("info");
    let box = document.getElementById("details");
    

    if (type === "braided") {
        title.innerHTML = "Braided Shield Cable";
        info.innerHTML = "Strong metal braid shielding; used in industrial and high-interference environments.";
    }

    else if (type === "foil") {
        title.innerHTML = "Foil Shield Cable";
        info.innerHTML = "Thin foil shielding; effective for high-frequency noise reduction.";
    }


       box.classList.remove("show");
 
    box.style.display = "block";

// trigger animation
setTimeout(() => {
    box.classList.add("show");
}, 10);
}
</script>

</head>

<body>
    <header>
     
        <div class="header-container">
            
            <!-- Logo + Name -->
            <img src="logo.jpeg" alt="Logo" class="logo">
            </div>
    <div class="header-left">
        <h1>ELECTROSPECS</h1>
    </div>

    <div class="scrolling-banner">
        <p>Welcome to ElectroSpecs | Explore Electronics Components | Learn & Build 🚀</p>
    </div>

</header>

<h2>SHIELDED PAIR CABLE TYPES</h2>

<!-- shielded GRID -->
<div class="shielded-container">

    <div class="shielded-card" onclick="showshielded('braided')">
        <img src="braided.jpeg">
        <p>BRAIDED SHIELD CABLE</p>
    </div>

    <div class="shielded-card" onclick="showshielded('foil')">
        <img src="foil.jpeg">
        <p>FOIL SHIELD CABLE</p>
    </div>




 </div> 
   
<!-- DETAILS -->
<div id="details">
    <h2 id="title"></h2>
    <p id="info"></p>
</div>
