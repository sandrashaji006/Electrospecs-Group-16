<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ICs - ElectroSpecs</title>

<link rel="stylesheet" href="styles.css">

<style>
/* Page title */
h2 {
    text-align: center;
    margin-top: 45px;
    color: #001f3f;
}

#details-box {
    transition: 0.3s;
}

/* Grid layout */
.ics-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
    width: 90%;
    margin: 40px auto;
}

/* Card style */
.ics-card {
    background: white;
    border-radius: 10px;
    padding: 15px;
    text-align: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    transition: 0.3s;
}

/* Hover effect */
.ics-card:hover {
    transform: scale(1.05);
}
.ics-card {
    text-decoration: none;   /* removes underline */
    color: black;            /* removes blue color */
    display: block;
}

/* Image */
.ics-card img {
    width: 100px;
    height: auto;
}

/* Text */
.ics-card p {
    margin-top: 10px;
    font-weight: bold;
}

/* Back button */
.back-btn {
    display: block;
    text-align: center;
    margin: 30px;
}
</style>


</head>

<body>

<!-- HEADER -->
<header>
     
        <div class="header-container">
            
            <!-- Logo + Name -->
            <img src="logo.png" alt="Logo" class="logo">
            </div>
    <div class="header-left">
        <h1>ELECTROSPECS</h1>
    </div>

    <div class="scrolling-banner">
        <p>Welcome to ElectroSpecs | Explore Electronics Components | Learn & Build 🚀</p>
    </div>

</header>

<!-- MAIN -->
<main>

<h2>INTEGRATED CIRCUIT</h2>

<div class="ics-container">


    
    <a href="analog.html" class="ics-card">
        <img src="images/analog.jpg">
        <p>ANALOG SIGNAL ICs</p>
    </a>

    
    <a  href="digital.html" class="ics-card">
        <img src="images/digital.jpg">
        <p>DIGITAL SIGNAL ICs</p>
    </a>


    <a href="mixed.html" class="ics-card">
        <img src="images/mixed-signal.jpg">
        <p>MIXED-SIGNAL ICs</p>
    </a>
    

</div>

<!-- DETAILS SECTION -->
<div id="details-box" style="width:90%; margin:40px auto; padding:20px; background:white; border-radius:10px; box-shadow:0 2px 8px rgba(0,0,0,0.2); display:none;">
    <h3 id="ics-name"></h3>
    <p id="ics-info"></p>
</div>

    

</div>

<div class="back-btn">
    <a href="components.html" class="button">⬅ Back to Components</a>
</div>

</main>

<!-- FOOTER -->
<footer>
    <div class="footer-container">
        <p>Contact Us:</p>
        <p>Phone:📞7907516323,8301934620</p>
        <p>Email:📧emaleena7@gmail.com,sandradgfgb.com</p>
    </div>
</footer>

</body>
</html>
