<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FAST RECOVERY DIODES</title>
<link rel="stylesheet" href="styles.css">
<style>
body {
    font-family: Arial;
    background: #f8f8f8;
    text-align: center;
    font-weight: bold;
}

/* Grid */
.fastrecovery-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
    width: 90%;
    margin: 40px auto;
}

/* Card */
.fastrecovery-card {
    background: white;
    padding: 15px;
    border-radius: 10px;
    cursor: pointer;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    transition: 0.3s;
}

.fastrecovery-card:hover {
    transform: scale(1.05);
}

/* Image */
.fastrecovery-card img {
    width: 100px;
}

/* Details box */
#details {
    width: 80%;
    margin: 30px auto;
    padding: 20px;
    background: white;
    border-radius: 10px;
    display: none;
    box-shadow: 0 2px 6px rgba(0,0,0,0.3);
}
</style>

<script>
    window.onload = function () {

    let hash = window.location.hash;

    if (hash) {
        let type = hash.replace("#", "");
        showFastrecovery(type);
    }
}
function showFastrecovery(type) {

    let title = document.getElementById("title");
    let info = document.getElementById("info");
    let box = document.getElementById("details");

    

    if (type === "uf4007") {
        title.innerHTML = "UF4007";
        info.innerHTML = "The UF4007 is an ultra-fast recovery rectifier diode designed for high-speed switching applications. It has a maximum repetitive reverse voltage of 1000 V and can handle a forward current of 1 A. The diode features a low forward voltage drop (around 1.0–1.7 V) and an ultra-fast reverse recovery time of about 50–75 ns, making it much faster than standard rectifier diodes like the 1N4007. It also has low reverse leakage current and good efficiency in high-frequency circuits. The UF4007 is commonly used in switch-mode power supplies (SMPS), inverters, freewheeling, and fast switching circuits, and is typically available in a DO-41 package.";
    }

    else if (type === "fr107") {
        title.innerHTML = "FR107";
        info.innerHTML = "The FR107 is a fast recovery rectifier diode designed for high-speed rectification applications. It has a maximum repetitive reverse voltage of 1000 V and a forward current rating of 1 A. The diode features a forward voltage drop of about 1.2–1.3 V and a fast reverse recovery time of approximately 500 ns, making it faster than standard rectifiers but slower than ultra-fast types like UF diodes. It also offers low reverse leakage current and good reliability under switching conditions. The FR107 is commonly used in power supplies, converters, inverters, and general-purpose fast switching circuits, and is typically available in a DO-41 package.";
    }
    box.style.display = "block";
}
</script>

</head>

<body>
    <header>
     
        <div class="header-container">
            
            <!-- Logo + Name -->
            <img src="logo.png" alt="Logo" class="logo">
            </div>
    <div class="header-left">
        <h1>ELECTROSPECS</h1>
    </div>

    <div class="scrolling-banner">
        <p>Welcome to ElectroSpecs | Explore Electronics Components | Learn & Build 🚀</p>
    </div>

</header>

<h2>FAST RECOVERY DIODES</h2>

<!-- FAST RECOVERY GRID -->
<div class="fastrecovery-container">

    <div class="fastrecovery-card" onclick="showFastrecovery('uf4007')">
        <img src="images/uf4007.jpg">
        <p>UF4007</p>
    </div>

    <div class="fastrecovery-card" onclick="showFastrecovery('fr107')">
        <img src="images/fr107.jpg">
        <p>FR107</p>
    </div>

</div>

<!-- DETAILS -->
<div id="details">
    <h2 id="title"></h2>
    <p id="info"></p>
</div>

</html>
