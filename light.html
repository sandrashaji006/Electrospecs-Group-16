<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LIGHT SENSOR</title>
<link rel="stylesheet" href="styles.css">
<style>
body {
    font-family: Arial;
    background: #f8f8f8;
    text-align: center;
    font-weight: bold;
}

/* Grid */
.light-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
    width: 90%;
    margin: 40px auto;
}

/* Card */
.light-card {
    background: white;
    padding: 15px;
    border-radius: 10px;
    cursor: pointer;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    transition: 0.3s;
}

.light-card:hover {
    transform: scale(1.05);
}

/* Image */
.light-card img {
    width: 100px;
}

/* Details box */
#details {
    width: 80%;
    margin: 30px auto;
    padding: 20px;
    background: white;
    border-radius: 10px;
    display: none;
    box-shadow: 0 2px 6px rgba(0,0,0,0.3);
}
</style>

<script>
    window.onload = function () {

    let hash = window.location.hash;

    if (hash) {
        let type = hash.replace("#", "");
        showLight(type);
    }
}
function showLight(type) {

    let title = document.getElementById("title");
    let info = document.getElementById("info");
    let box = document.getElementById("details");

    

    if (type === "ldr") {
        title.innerHTML = "LDR";
        info.innerHTML = "The LDR (Light Dependent Resistor) is a passive light sensor whose resistance changes based on light intensity. It has high resistance in darkness (mega-ohms range) and low resistance in bright light (few hundred ohms to kilo-ohms). It operates without power and provides an analog change in resistance rather than voltage output. LDRs are commonly used in automatic street lights, light meters, and light-activated switches.";
    }

    else if(type === "bh1750") {
        title.innerHTML = "BH1750";
        info.innerHTML = "The BH1750 light intensity sensor is a digital ambient light sensor used to measure illuminance in lux. It operates with a supply voltage of 2.4 V to 3.6 V (some modules support 5 V via regulator) and communicates via the I²C interface. The measurement range is typically 1 lux to 65,000 lux, with a resolution of about 1 lux. It provides direct digital output, low power consumption, and good accuracy, making it ideal for display brightness control, smart lighting, and IoT applications.";
    }

    else if(type === "tcs3200") {
        title.innerHTML = "TCS3200";
        info.innerHTML = "The TCS3200 color sensor is a programmable color sensor that converts light intensity into a frequency output. It operates at a 3 V to 5 V supply and uses an array of photodiodes with red, green, blue, and clear filters. The output is a square wave whose frequency corresponds to the detected color intensity. It typically has a detection range from very low light up to bright light conditions and is commonly used in color recognition systems, sorting applications, and robotics.";
    }
    else if(type === "tsl2561") {
        title.innerHTML = "TSL2561";
        info.innerHTML = "The TSL2561 light sensor is a digital ambient light sensor used to measure illuminance in lux. It operates with a supply voltage of 2.7 V to 3.6 V and communicates via the I²C interface. The sensor has a wide detection range from about 0.1 lux to 40,000+ lux, with built-in dual photodiodes (visible + infrared) for better accuracy. It provides selectable gain and integration time, low power consumption, and is commonly used in automatic display brightness control and smart lighting systems";
    }

    
    box.style.display = "block";
}
</script>

</head>

<body>
    <header>
     
        <div class="header-container">
            
            <!-- Logo + Name -->
            <img src="logo.png" alt="Logo" class="logo">
            </div>
    <div class="header-left">
        <h1>ELECTROSPECS</h1>
    </div>

    <div class="scrolling-banner">
        <p>Welcome to ElectroSpecs | Explore Electronics Components | Learn & Build 🚀</p>
    </div>

</header>

<h2>LIGHT SENSORS</h2>

<!-- LIGHT SENSOR GRID -->
<div class="light-container">

    <div class="light-card" onclick="showLight('ldr')">
        <img src="ldr.jpg">
        <p>LDR</p>
    </div>
    <div class="light-card" onclick="showLight('bh1750')">
        <img src="images/bh1750.jpg">
        <p>BH1750</p>
    </div>
    <div class="light-card" onclick="showLight('tcs3200')">
        <img src="tcs3200.jpg">
        <p>TCS3200</p>
    </div>
    <div class="light-card" onclick="showLight('tsl2561')">
        <img src="images/tsl2561.jpg">
        <p>TSL2561</p>
    </div>

    
</div>

<!-- DETAILS -->
<div id="details">
    <h2 id="title"></h2>
    <p id="info"></p>
</div>
