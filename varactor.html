<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VARACTOR DIODES</title>
<link rel="stylesheet" href="styles.css">
<style>
body {
    font-family: Arial;
    background: #f8f8f8;
    text-align: center;
    font-weight: bold;
}

/* Grid */
.varactor-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
    width: 90%;
    margin: 40px auto;
}

/* Card */
.varactor-card {
    background: white;
    padding: 15px;
    border-radius: 10px;
    cursor: pointer;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    transition: 0.3s;
}

.varactor-card:hover {
    transform: scale(1.05);
}

/* Image */
.varactor-card img {
    width: 100px;
}

/* Details box */
#details {
    width: 80%;
    margin: 30px auto;
    padding: 20px;
    background: white;
    border-radius: 10px;
    display: none;
    box-shadow: 0 2px 6px rgba(0,0,0,0.3);
}
</style>

<script>
    window.onload = function () {

    let hash = window.location.hash;

    if (hash) {
        let type = hash.replace("#", "");
        showVaractor(type);
    }
}
function showVaractor(type) {

    let title = document.getElementById("title");
    let info = document.getElementById("info");
    let box = document.getElementById("details");

    

    if (type === "bb105") {
        title.innerHTML = "BB105";
        info.innerHTML = "The BB105 is a silicon planar variable capacitance diode (varicap) primarily used for electronic frequency tuning in VHF and UHF tuners. It features a maximum reverse voltage of 28V and a continuous forward current rating of 20mA. The diode provides a tuning capacitance range typically between 1.8pF and 17.5pF with a series resistance of approximately 0.9Ω It is available in various packages including the through-hole DO-35 and surface-mount SOD-23, making it suitable for compact radio frequency (RF) circuits";
    }

    else if (type === "bb139") {
        title.innerHTML = "BB139";
        info.innerHTML = "The BB139 is a silicon variable capacitance diode (varicap) designed for electronic frequency tuning in VHF/FM tuners. It typically offers a capacitance range of 4.3pF to 29pF with a maximum working inverse voltage of 30V. Known for its high-quality factor (min.150) , it is commonly housed in the through-hole DO-35 glass package.";
    }
  

    box.style.display = "block";
}
</script>

</head>

<body>
    <header>
     
        <div class="header-container">
            
            <!-- Logo + Name -->
            <img src="logo.png" alt="Logo" class="logo">
            </div>
    <div class="header-left">
        <h1>ELECTROSPECS</h1>
    </div>

    <div class="scrolling-banner">
        <p>Welcome to ElectroSpecs | Explore Electronics Components | Learn & Build 🚀</p>
    </div>

</header>

<h2>VARACTOR DIODES</h2>

<!-- VARACTOR GRID -->
<div class="varactor-container">

    <div class="varactor-card" onclick="showVaractor('bb105')">
        <img src="images/bb105.jpg">
        <p>BB105</p>
    </div>

    <div class="varactor-card" onclick="showVaractor('bb139')">
        <img src="images/bb139.jpg">
        <p>BB139</p>
    </div>

</div>

<!-- DETAILS -->
<div id="details">
    <h2 id="title"></h2>
    <p id="info"></p>
</div>

</html>
