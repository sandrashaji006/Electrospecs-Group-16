<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DIGITAL</title>
<link rel="stylesheet" href="styles.css">
<style>
body {
    font-family: Arial;
    background: #f8f8f8;
    text-align: center;
    font-weight: bold;
}

/* Grid */
.digital-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
    width: 90%;
    margin: 40px auto;
}

/* Card */
.digital-card {
    background: white;
    padding: 15px;
    border-radius: 10px;
    cursor: pointer;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    transition: 0.3s;
}

.digital-card:hover {
    transform: scale(1.05);
}

/* Image */
.digital-card img {
    width: 100px;
}

/* Details box */
#details {
    width: 80%;
    margin: 30px auto;
    padding: 20px;
    background: white;
    border-radius: 10px;
    display: none;
    box-shadow: 0 2px 6px rgba(0,0,0,0.3);
}
</style>

<script>
    window.onload = function () {

    let hash = window.location.hash;

    if (hash) {
        let type = hash.replace("#", "");
        showDigital(type);
    }
}
function showDigital(type) {

    let title = document.getElementById("title");
    let info = document.getElementById("info");
    let box = document.getElementById("details");

    

    if (type === "74hc00") {
        title.innerHTML = "74HC00";
        info.innerHTML = "The 74HC00 quad 2-input NAND gate IC is a high-speed CMOS logic IC that contains four independent 2-input NAND gates. It operates with a supply voltage from 2 V to 6 V (typically 5 V) and offers low power consumption with high noise immunity. The IC provides fast switching speeds (propagation delay around 8–15 ns) and is compatible with TTL input levels. It is widely used in digital logic circuits for basic logic operations.";
    }

    else if (type === "74hc04") {
        title.innerHTML = "74HC04";
        info.innerHTML = "The 74HC04 hex inverter IC is a high-speed CMOS logic IC that contains six independent NOT gates (inverters). It operates with a supply voltage from 2 V to 6 V (typically 5 V) and features low power consumption with high noise immunity. The IC offers fast switching speed with a propagation delay of about 8–15 ns and is compatible with TTL input levels, making it useful for signal inversion and digital logic applications.";
    }

    else if (type === "74hc08") {
        title.innerHTML = "74HC08";
        info.innerHTML = "The 74HC08 quad 2-input AND gate IC is a high-speed CMOS logic IC that contains four independent 2-input AND gates. It operates with a supply voltage from 2 V to 6 V (typically 5 V) and offers low power consumption with high noise immunity. The IC has fast switching speed with a propagation delay of about 8–15 ns and is compatible with TTL input levels, making it suitable for digital logic applications.";
    }
    else if(type === "74hc32") {
        title.innerHTML = "74HC32";
        info.innerHTML = "The 74HC32 quad 2-input OR gate IC is a high-speed CMOS logic IC that contains four independent 2-input OR gates. It operates with a supply voltage from 2 V to 6 V (typically 5 V) and features low power consumption with high noise immunity. The IC offers fast switching speed with a propagation delay of about 8–15 ns and is compatible with TTL input levels, making it suitable for digital logic circuits.";
    }
    else if(type === "atmega328p") {
        title.innerHTML = "ATmega328P";
        info.innerHTML = "The ATmega328P microcontroller is an 8-bit AVR MCU that operates from 1.8 V to 5.5 V with clock speeds up to 20 MHz. It features 32 KB Flash memory, 2 KB SRAM, and 1 KB EEPROM. The microcontroller includes 23 I/O pins, 6-channel 10-bit ADC, timers, PWM, and communication interfaces like USART, SPI, and I²C. It has low power consumption with multiple sleep modes, making it widely used in embedded systems such as Arduino-based projects.";
    }
    else if(type === "rp2040") {
        title.innerHTML = "RP2040";
        info.innerHTML = "The RP2040 microcontroller is a 32-bit dual-core ARM Cortex-M0+ MCU developed by Raspberry Pi. It operates at up to 133 MHz and works with a supply voltage of about 1.8 V to 3.3 V. It includes 264 KB SRAM, no internal flash (uses external QSPI flash), and offers 26 GPIO pins. The chip features 12-bit ADC (4 channels), PWM, timers, UART, SPI, and I²C interfaces, along with unique Programmable I/O (PIO) blocks for custom hardware control. It is known for low cost, flexibility, and good performance in embedded applications.";
    }

    
    box.style.display = "block";
}
</script>

</head>

<body>
    <header>
     
        <div class="header-container">
            
            <!-- Logo + Name -->
            <img src="logo.png" alt="Logo" class="logo">
            </div>
    <div class="header-left">
        <h1>ELECTROSPECS</h1>
    </div>

    <div class="scrolling-banner">
        <p>Welcome to ElectroSpecs | Explore Electronics Components | Learn & Build 🚀</p>
    </div>

</header>

<h2>DIGITAL SIGNAL ICs</h2>

<!-- DIGITAL GRID -->
<div class="digital-container">

    <div class="digital-card" onclick="showDigital('74hc08')">
        <img src="images/74hc08.jpg">
        <p>74HC08</p>
    </div>

    <div class="digital-card" onclick="showDigital('74hc04')">
        <img src="images/74hc04.jpg">

    </div>
    <div class="digital-card" onclick="showDigital('74hc00')">

    <div class="digital-card" onclick="showDigital('74hc32')">

        <p>74HC32</p>
    </div>
    <div class="digital-card" onclick="showDigital('atmega328p')">
        <img src="images/atmega328p.jpg">

    </div>
    <div class="digital-card" onclick="showDigital('rp2040')">

        <p>RP2040</p>
    </div>
</div>
