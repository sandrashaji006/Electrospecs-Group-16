<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Optical Fiber Types</title>
<link rel="stylesheet" href="styles.css">
<style>
body {
    font-family: Arial;
    background: #f8f8f8;
    text-align: center;
    font-weight: bold;
}

/* Grid */
.optical-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
    width: 90%;
    margin: 40px auto;
}

/* Card */
.optical-card {
    background: white;
    padding: 15px;
    border-radius: 10px;
    cursor: pointer;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    transition: 0.3s;
}

.optical-card:hover {
    transform: scale(1.05);
}

/* Image */
.optical-card img {
    width: 100px;
}

/* Details box */
#details {
    width: 80%;
    margin: 30px auto;
    padding: 20px;
    background: white;
    border-radius: 12px;
    display: none;

    box-shadow: 0 10px 25px rgba(0,0,0,0.3);

    transform: scale(0.8);
    opacity: 0;
    transition: all 0.35s ease;
}

/* when active */
#details.show {
    display: block;
    transform: scale(1);
    opacity: 1;
}
</style>

<script>
function showoptical(type) {

    let title = document.getElementById("title");
    let info = document.getElementById("info");
    let box = document.getElementById("details");
    

    if (type === "single") {
        title.innerHTML = "Single-Mode Fiber:";
        info.innerHTML = "Very small core, supports long-distance transmission with high bandwidth and low loss.";
    }

    else if (type === "multi") {
        title.innerHTML = "Multi-Mode Fiber";
        info.innerHTML = "Larger core, used for short-distance communication; cheaper than single-mode.";
    }

    else if (type === "pof") {
        title.innerHTML = "Plastic Optical Fiber (POF)";
        info.innerHTML = "Flexible and easy to install; used in home and consumer electronics.";
    }
   
       box.classList.remove("show");
 
    box.style.display = "block";

// trigger animation
setTimeout(() => {
    box.classList.add("show");
}, 10);
}
</script>

</head>

<body>
    <header>
     
        <div class="header-container">
            
            <!-- Logo + Name -->
            <img src="logo.jpeg" alt="Logo" class="logo">
            </div>
    <div class="header-left">
        <h1>ELECTROSPECS</h1>
    </div>

    <div class="scrolling-banner">
        <p>Welcome to ElectroSpecs | Explore Electronics Components | Learn & Build 🚀</p>
    </div>

</header>

<h2>OPTICAL PAIR CABLE TYPES</h2>

<!-- optical GRID -->
<div class="optical-container">

    <div class="optical-card" onclick="showoptical('single')">
        <img src="singlemode.jpeg">
        <p>SINGLE-MODE FIBER</p>
    </div>

    <div class="optical-card" onclick="showoptical('multi')">
        <img src="multimode.jpeg">
        <p>MULTI-MODE FIBER</p>
    </div>

    <div class="optical-card" onclick="showoptical('pof')">
        <img src="pof.jpeg">
        <p>PLASTIC OPTICSL FIBER (POF)</p>
    </div>



 </div> 
   
<!-- DETAILS -->
