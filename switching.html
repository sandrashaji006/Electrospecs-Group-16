<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Switching Diodes</title>
<link rel="stylesheet" href="styles.css">
<style>
body {
    font-family: Arial;
    background: #f8f8f8;
    text-align: center;
    font-weight: bold;
}

/* Grid */
.switching-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
    width: 90%;
    margin: 40px auto;
}

/* Card */
.switching-card {
    background: white;
    padding: 15px;
    border-radius: 10px;
    cursor: pointer;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    transition: 0.3s;
}

.switching-card:hover {
    transform: scale(1.05);
}

/* Image */
.switching-card img {
    width: 100px;
}

/* Details box */
#details {
    width: 80%;
    margin: 30px auto;
    padding: 20px;
    background: white;
    border-radius: 10px;
    display: none;
    box-shadow: 0 2px 6px rgba(0,0,0,0.3);
}
</style>

<script>
    window.onload = function () {

    let hash = window.location.hash;

    if (hash) {
        let type = hash.replace("#", "");
        showSwitching(type);
    }
}
function showSwitching(type) {

    let title = document.getElementById("title");
    let info = document.getElementById("info");
    let box = document.getElementById("details");
    

    if (type === "1n4148") {
        title.innerHTML = "1N4148";
        info.innerHTML = "The 1N4148 is a standard silicon small-signal switching diode, widely used for its fast response and reliability in high-frequency applications up to 100 MHz. It features a maximum repetitive peak reverse voltage of 100V and a continuous forward current typically ranging from 150mA to 300mA. Its standout specification is a very short reverse recovery time of just 4ns to 8ns, making it ideal for rapid switching in digital logic and signal processing circuits. The diode typically has a forward voltage drop of approximately 0.7V to 1.0V at rated current and a low junction capacitance of about 4pF. Common packaging includes the DO-35 through-hole glass axial leaded package, though surface-mount versions like the SOD-123 and SOD-323 are also widely available";
    }

    else if (type === "1n4448") {
        title.innerHTML = "1N4448";
        info.innerHTML = "The 1N4448 is a high-speed silicon switching diode that is essentially a higher-performance version of the standard 1N4148. It is designed for rapid signal processing and rectification, featuring a very fast reverse recovery time of approximately 4ns. While it shares the same 100V peak reverse voltage and 4pF junction capacitance as the 1N4148, the 1N4448 is often selected for its slightly better forward characteristics, specifically a tighter tolerance on forward voltage, which is typically 0.62V to 0.72V at 5mA. It can handle a continuous forward current of up to 300mA (depending on the manufacturer and thermal conditions) and is most commonly found in the DO-35 glass axial package.";
    }

    

    box.style.display = "block";
}
</script>

</head>

<body>
    <header>
     
        <div class="header-container">
            
            <!-- Logo + Name -->
            <img src="logo.png" alt="Logo" class="logo">
            </div>
    <div class="header-left">
        <h1>ELECTROSPECS</h1>
    </div>

    <div class="scrolling-banner">
        <p>Welcome to ElectroSpecs | Explore Electronics Components | Learn & Build 🚀</p>
    </div>

</header>

<h2>Switching Diodes</h2>

<!-- SWITCHING GRID -->
<div class="switching-container">

    <div class="switching-card" onclick="showSwitching('1n4148')">
        <img src="images/1n4148.jpg">
        <p>1N4148</p>
    </div>

    <div class="switching-card" onclick="showSwitching('1n4448')">
        <img src="images/1n4448.jpg">
        <p>1N4448</p>
    </div>

    

</div>

<!-- DETAILS -->
<div id="details">
    <h2 id="title"></h2>
    <p id="info"></p>
</div>
