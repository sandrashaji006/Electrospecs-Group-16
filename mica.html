<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mica Capacitors</title>
<link rel="stylesheet" href="styles.css">
<style>
body {
    font-family: Arial;
    background: #f8f8f8;
    text-align: center;
    font-weight: bold;
}

/* Grid */
.mica-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
    width: 90%;
    margin: 40px auto;
}

/* Card */
.mica-card {
    background: white;
    padding: 15px;
    border-radius: 10px;
    cursor: pointer;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    transition: 0.3s;
}

.mica-card:hover {
    transform: scale(1.05);
}

/* Image */
.mica-card img {
    width: 100px;
}

/* Details box */
#details {
    width: 80%;
    margin: 30px auto;
    padding: 20px;
    background: white;
    border-radius: 12px;
    display: none;

    box-shadow: 0 10px 25px rgba(0,0,0,0.3);

    transform: scale(0.8);
    opacity: 0;
    transition: all 0.35s ease;
}

/* when active */
#details.show {
    display: block;
    transform: scale(1);
    opacity: 1;
}
</style>

<script>
function showmica(type) {

    let title = document.getElementById("title");
    let info = document.getElementById("info");
    let box = document.getElementById("details");
    

    if (type === "silver") {
        title.innerHTML = "Silver Mica Capacitors";
        info.innerHTML = "These are the most common mica capacitors, made by coating mica sheets with silver electrodes. They offer very high stability, low loss, excellent accuracy, and long life. They are mainly used in RF circuits, oscillators, filters, and high-frequency communication equipment.";
    }

    else if (type === "molded") {
        title.innerHTML = "Molded Mica Capacitors";
        info.innerHTML = "These capacitors are sealed in a molded case for better protection against moisture, dust, and mechanical damage. They provide good stability and reliability, making them suitable for industrial and communication applications where environmental protection is required.";
    }

    else if (type === "stacked") {
        title.innerHTML = "Stacked Mica Capacitors:";
        info.innerHTML = "These are built by stacking multiple mica sheets with metal electrodes to achieve higher capacitance values. They maintain good accuracy and stability and are used in medium-frequency and precision electronic circuits.";
    }
   
       box.classList.remove("show");
 
    box.style.display = "block";

// trigger animation
setTimeout(() => {
    box.classList.add("show");
}, 10);
}
</script>

</head>

<body>
    <header>
     
        <div class="header-container">
            
            <!-- Logo + Name -->
            <img src="logo.jpeg" alt="Logo" class="logo">
            </div>
    <div class="header-left">
        <h1>ELECTROSPECS</h1>
    </div>

    <div class="scrolling-banner">
        <p>Welcome to ElectroSpecs | Explore Electronics Components | Learn & Build 🚀</p>
    </div>

</header>

<h2>Mica Capacitors</h2>

<!-- mica GRID -->
<div class="mica-container">

    <div class="mica-card" onclick="showmica('silver')">
        <img src="silver.jpeg">
        <p>SILVER MICA CAPACITOR</p>
    </div>

    <div class="mica-card" onclick="showmica('molded')">
        <img src="molded.jpeg">
        <p>MOLDED MICA CAPACITOR</p>
    </div>

    <div class="mica-card" onclick="showmica('stacked')">
        <img src="stacked.jpeg">
        <p>STACKED MICA CAPACITOR</p>
    </div>



  

 </div>    
<!-- DETAILS -->
<div id="details">
    <h2 id="title"></h2>
    <p id="info"></p>
</div>
