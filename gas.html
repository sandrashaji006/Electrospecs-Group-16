<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GAS SENSOR</title>
<link rel="stylesheet" href="styles.css">
<style>
body {
    font-family: Arial;
    background: #f8f8f8;
    text-align: center;
    font-weight: bold;
}

/* Grid */
.gas-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
    width: 90%;
    margin: 40px auto;
}

/* Card */
.gas-card {
    background: white;
    padding: 15px;
    border-radius: 10px;
    cursor: pointer;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    transition: 0.3s;
}

.gas-card:hover {
    transform: scale(1.05);
}

/* Image */
.gas-card img {
    width: 100px;
}

/* Details box */
#details {
    width: 80%;
    margin: 30px auto;
    padding: 20px;
    background: white;
    border-radius: 10px;
    display: none;
    box-shadow: 0 2px 6px rgba(0,0,0,0.3);
}
</style>

<script>
    window.onload = function () {

    let hash = window.location.hash;

    if (hash) {
        let type = hash.replace("#", "");
        showGas(type);
    }
}
function showGas(type) {

    let title = document.getElementById("title");
    let info = document.getElementById("info");
    let box = document.getElementById("details");

    

    if (type === "mq-2") {
        title.innerHTML = "MQ-2";
        info.innerHTML = "The MQ-2 gas sensor is a semiconductor gas sensor used for detecting LPG, propane, methane, hydrogen, alcohol, and smoke. It operates at a 5 V supply and has a sensing resistance that varies with gas concentration. The sensor typically provides an analog output voltage and has a detection range of about 300–10,000 ppm (depending on gas type). It has a built-in heating element (~800 mW power) for proper sensing and requires preheating for stable readings.";
    }

    else if(type === "mq-3") {
        title.innerHTML = "MQ-3";
        info.innerHTML = "The MQ-3 gas sensor is a semiconductor alcohol sensor used for detecting ethanol, alcohol vapors, and smoke. It operates at a 5 V supply and includes a built-in heating element for proper sensing. The sensor provides an analog output voltage that varies with gas concentration, typically in a range of about 25–500 ppm (alcohol sensitivity range). It has good sensitivity to alcohol and lower sensitivity to gases like LPG and CO, making it commonly used in breath alcohol detection systems.";
    }

    else if (type === "mq-7") {
        title.innerHTML = "MQ-7";
        info.innerHTML = "The MQ-7 gas sensor is a semiconductor gas sensor mainly used for detecting carbon monoxide (CO). It operates at a 5 V supply and uses a built-in heating element that works in high/low heating cycles to improve accuracy. The sensor provides an analog output proportional to CO concentration, typically in the range of 10–1000 ppm. It requires preheating for stable readings and is commonly used in air quality and CO alarm systems.";
    }
    else if(type === "mq-8") {
        title.innerHTML = "MQ-8";
        info.innerHTML = "The MQ-8 gas sensor is a semiconductor gas sensor used for detecting hydrogen gas (H₂). It operates at a 5 V supply and includes a built-in heating element for proper sensing. The sensor provides an analog output voltage that changes with hydrogen concentration, typically in the range of 100–10000 ppm (depending on conditions). It has high sensitivity to hydrogen with good stability after preheating, and is commonly used in gas leakage detection and industrial safety systems.";
    }
    else if(type === "mq-135") {
        title.innerHTML = "MQ-135";
        info.innerHTML = "The MQ-135 gas sensor is a semiconductor air-quality sensor used to detect ammonia (NH₃), benzene, smoke, CO₂, alcohol, and other harmful gases. It operates at a 5 V supply and includes a built-in heating element for sensing. The sensor provides an analog output voltage that varies with gas concentration, typically in a range of about 10–1000 ppm (depending on gas type). It has good sensitivity for air quality monitoring and requires preheating for stable and accurate readings.";
    }

    
    box.style.display = "block";
}
</script>

</head>

<body>
    <header>
     
        <div class="header-container">
            
            <!-- Logo + Name -->
            <img src="logo.png" alt="Logo" class="logo">
            </div>
    <div class="header-left">
        <h1>ELECTROSPECS</h1>
    </div>

    <div class="scrolling-banner">
        <p>Welcome to ElectroSpecs | Explore Electronics Components | Learn & Build 🚀</p>
    </div>

</header>

<h2>GAS SENSORS</h2>

<!-- GAS SENSOR GRID -->
<div class="gas-container">

    <div class="gas-card" onclick="showGas('mq-2')">
        <img src="images/mq-2.jpg">
        <p>MQ-2 GAS SENSOR</p>
    </div>
    <div class="gas-card" onclick="showGas('mq-3')">
        <img src="images/mq-3.jpg">
        <p>MQ-3 GAS SENSOR</p>
    </div>
    <div class="gas-card" onclick="showGas('mq-7')">
        <img src="images/mq-7.jpg">
        <p>MQ-7 GAS SENSOR</p>
    </div>
    <div class="gas-card" onclick="showGas('mq-8')">
        <img src="images/mq-8.jpg">
        <p>MQ-8 GAS SENSOR</p>
    </div>
    <div class="gas-card" onclick="showGas('mq-135')">
        <img src="images/mq-135.jpg">
        <p>MQ-135 GAS SENSOR</p>
    </div>

    
</div>

<!-- DETAILS -->

</div>
