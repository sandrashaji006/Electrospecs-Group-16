<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unshielded Cable Types</title>
<link rel="stylesheet" href="styles.css">
<style>
body {
    font-family: Arial;
    background: #f8f8f8;
    text-align: center;
    font-weight: bold;
}

/* Grid */
.unshielded-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
    width: 90%;
    margin: 40px auto;
}

/* Card */
.unshielded-card {
    background: white;
    padding: 15px;
    border-radius: 10px;
    cursor: pointer;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    transition: 0.3s;
}

.unshielded-card:hover {
    transform: scale(1.05);
}

/* Image */
.unshielded-card img {
    width: 100px;
}

/* Details box */
#details {
    width: 80%;
    margin: 30px auto;
    padding: 20px;
    background: white;
    border-radius: 12px;
    display: none;

    box-shadow: 0 10px 25px rgba(0,0,0,0.3);

    transform: scale(0.8);
    opacity: 0;
    transition: all 0.35s ease;
}

/* when active */
#details.show {
    display: block;
    transform: scale(1);
    opacity: 1;
}
</style>

<script>
function showunshielded(type) {

    let title = document.getElementById("title");
    let info = document.getElementById("info");
    let box = document.getElementById("details");
    

    if (type === "hookup") {
        title.innerHTML = "Hook-up Wire";
        info.innerHTML = "Single insulated wire used in circuits and PCB connections.";
    }

    else if (type === "solid") {
        title.innerHTML = "Solid/Stranded Copper Wire";
        info.innerHTML = "Used in general electrical wiring; stranded is flexible, solid is rigid.";
    }


       box.classList.remove("show");
 
    box.style.display = "block";

// trigger animation
setTimeout(() => {
    box.classList.add("show");
}, 10);
}
</script>

</head>

<body>
    <header>
     
        <div class="header-container">
            
            <!-- Logo + Name -->
            <img src="logo.jpeg" alt="Logo" class="logo">
            </div>
    <div class="header-left">
        <h1>ELECTROSPECS</h1>
    </div>

    <div class="scrolling-banner">
        <p>Welcome to ElectroSpecs | Explore Electronics Components | Learn & Build 🚀</p>
    </div>

</header>

<h2>UNSHIELDED PAIR CABLE TYPES</h2>

<!-- unshielded GRID -->
<div class="unshielded-container">

    <div class="unshielded-card" onclick="showunshielded('hookup')">
        <img src="hookup.jpeg">
        <p>HOOK-UP WIRE</p>
    </div>

    <div class="unshielded-card" onclick="showunshielded('solid')">
        <img src="copper.jpeg">
        <p>SOLID/STANDARD COPPER WIRE</p>
    </div>
 </div> 
   
<!-- DETAILS -->
<div id="details">
    <h2 id="title"></h2>
    <p id="info"></p>
</div>
